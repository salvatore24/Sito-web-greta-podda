<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Contatti - AFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="main-header">
    <div class="logo-area">
      <img src="logo.png" alt="Logo AFT">
      <span class="brand-title">AFT</span>
    </div>
    <nav class="main-nav">
      <ul id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="chi-siamo.html">Chi siamo</a></li>

        <li><a href="contatti.html" class="active">Contatti</a></li>
      </ul>
    </nav>
  </header>

  <main class="section">
    <h1>Contattaci</h1>
    <form id="contact-form" action="mailto:info@aft.com" method="POST" enctype="text/plain" novalidate>
      <label for="name">Nome</label>
      <input id="name" name="name" type="text" required minlength="3" />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />

      <label for="message">Messaggio</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit" class="btn primary">Invia</button>
    </form>

    <section class="contact-info">
      <h2>Informazioni</h2>
      <p>📍 Centro Sandro Pertini, via dello Sport 70, Cornaredo (MI)</p>
      <p>📞 Donato: 331 272 5217</p>
      <p>📞 Greta: 329 146 1873</p>
      <p>✉ info@aft.com</p>
    </section>
  </main>

  <footer class="main-footer">
    <small>&copy; 2025 AFT – Advanced Football Training</small>
  </footer>
  
  <script src="main.js"></script>
</body>
</html>
