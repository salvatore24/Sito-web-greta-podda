name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Questo passaggio prepara i file spostandoli dove serve
      - name: Prepare Assets
        run: |
          cp -r asset html/ 2>/dev/null || true
          cp main.js html/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './html' # Pubblica il contenuto della cartella html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
